name: Daily Political Science Journal Crawler

on:
  schedule:
    # GitHub cron uses UTC. The script gates delivery to 9:00 AM America/New_York.
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:       # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: daily-email
  cancel-in-progress: false

jobs:
  crawl-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run journal crawler
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python journal_crawler.py

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "output md files/" seen_dois.json last_sent_et_date.txt || true
          git diff --cached --quiet || git commit -m "chore: add report $(date +'%Y-%m-%d')"
          git push
