name: Keepalive

on:
  schedule:
    - cron: '0 12 * * *'   # 매일 UTC 12:00 (EDT 8AM) — daily_email보다 1시간 앞서 실행
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Keep repo active
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive $(date +'%Y-%m-%d')"
          git push
