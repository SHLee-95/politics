name: Process Formspree Subscriptions

on:
  schedule:
    - cron: '0 * * * *'   # 매시간 실행
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Process new subscriptions
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python .github/scripts/process_formspree.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribers.json seen_formspree_ids.json || true
          git diff --cached --quiet || git commit -m "chore: update subscribers from Formspree"
          git pull --rebase origin main
          git push
